services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: discursiva
      POSTGRES_PASSWORD: discursiva
      POSTGRES_DB: discursiva
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../packages/infra/src/discursiva_infra/postgres/migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discursiva"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data: