service: discursiva

frameworkVersion: "3"

plugins:
  - serverless-offline
  - serverless-localstack

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'local'}
  memorySize: 256
  timeout: 29

  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    S3_BUCKET: ${self:custom.s3Bucket}
    SQS_QUEUE_URL: ${self:custom.sqsQueueUrl}
    S3_ENDPOINT_URL: ${self:custom.awsEndpoint}
    SQS_ENDPOINT_URL: ${self:custom.awsEndpoint}
    STAGE: ${self:provider.stage}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: "arn:aws:s3:::${self:custom.s3Bucket}/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: "arn:aws:sqs:${self:provider.region}:*:corrections-queue"

functions:
  status:
    handler: apps/api/src/api/handlers/+status.handler
    description: "Status do API Gateway, pode ser subistituido solução mais robusta"
    package:
      patterns:
        - "apps/api/src/**"
    events:
      - http:
          path: /status
          method: get
          cors: true


  createSubmission:
    handler: apps/api/src/api/handlers/create_submission.handler
    description: "Recebe texto, salva no S3, cria job PENDING no Postgres, publica na fila"
    package:
      patterns:
        - "apps/api/src/**"
    events:
      - http:
          path: /submissions
          method: post
          cors: true

  getSubmission:
    handler: apps/api/src/api/handlers/get_submission.handler
    description: "Retorna detalhes + status + nota de uma submissão"
    package:
      patterns:
        - "apps/api/src/**"
    events:
      - http:
          path: /submissions/{id}
          method: get
          cors: true

  listSubmissions:
    handler: apps/api/src/api/handlers/list_submissions.handler
    description: "Lista submissões por student_id com paginação simples"
    package:
      patterns:
        - "apps/api/src/**"
    events:
      - http:
          path: /submissions
          method: get
          cors: true

resources:
  Resources:

    SubmissionsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.s3Bucket}

    CorrectionsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: corrections-queue
        VisibilityTimeout: 60
        MessageRetentionPeriod: 3600
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [CorrectionsDLQ, Arn]
          maxReceiveCount: 3

    CorrectionsDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: corrections-dlq
        MessageRetentionPeriod: 86400

  Outputs:
    ApiGatewayUrl:
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: ApiGatewayRestApi
            - ".execute-api.${self:provider.region}.amazonaws.com/${self:provider.stage}"

custom:
  s3Bucket: discursiva-submissions
  sqsQueueUrl: ${env:SQS_QUEUE_URL}
  awsEndpoint: ${env:S3_ENDPOINT_URL}

  localstack:
    stages:
      - local
    host: ${env:LOCALSTACK_HOST, 'http://localhost'}
    edgePort: ${env:LOCALSTACK_PORT, 4566}
    autostart: true
    lambda:
      mountCode: true
    docker:
      sudo: False
      compose_file: docker/compose.localstack.yml

  serverless-offline:
    httpPort: 8000
    lambdaPort: 8002
    noPrependStageInUrl: true

package:
  individually: true
  patterns:
    - "!**"
    - "packages/domain/src/**"
    - "packages/infra/src/**"
    - "!node_modules/**"
    - "!**/.venv/**"
    - "!**/tests/**"
    - "!**/__pycache__/**"
    - "!apps/frontend/**"
    - "!packages/infra/init-localstack.sh"
    - "!docker-compose.yml"
    - "!**/compose.yml"
    - "!**/Dockerfile.dev"
    - "!**/Dockerfile"
    - "!.git/**"
    - "!.serverless/**"
    - "!package-lock.json"