services:
  frontend:
    image: node:22-slim
    working_dir: /app/apps/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
      - /app/apps/frontend/node_modules
    tty: true
    stdin_open: true
    environment:
      INTERNAL_API_URL: http://api:8000
      NEXT_TELEMETRY_DISABLED: 1

