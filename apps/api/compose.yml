services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
      PYTHONPATH: /app/packages/domain/src:/app/packages/infra/src
      PATH: /opt/venv/bin:$PATH
      LOCALSTACK_HOST: http://localstack
      LOCALSTACK_PORT: 4566
    command: >
      sh -c "uv sync --quiet &&
             npm install &&
             npx serverless offline --stage local --host 0.0.0.0"
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/.venv
    env_file: ../../.env.local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/submissions?student_id=1"]
      interval: 10s
      timeout: 5s
      retries: 10
