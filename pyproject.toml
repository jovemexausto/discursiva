[tool.uv.workspace]
members = [
    "packages/domain",
    "packages/infra",
    "apps/api",
    "apps/worker",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "boto3-stubs[s3,sqs]>=1.42.68",
]

[tool.basedpyright]
typeCheckingMode = "standard"
extraPaths = [
    "apps/api/src",
    "apps/worker/src",
    "packages/domain/src",
    "packages/infra/src",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
