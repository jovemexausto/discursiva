services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: discursiva
      POSTGRES_PASSWORD: discursiva
      POSTGRES_DB: discursiva
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/discursiva_infra/postgres/migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discursiva"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      DEFAULT_REGION: us-east-1
    volumes:
      - ls_data:/var/lib/localstack
      - ./init-localstack.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  ls_data: