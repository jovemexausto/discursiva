[project]
name = "discursiva-infra"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "discursiva-domain",
    "asyncpg>=0.29",
    "boto3>=1.34",
    "pydantic-settings>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/discursiva_infra"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.uv.sources]
discursiva-domain = { workspace = true }