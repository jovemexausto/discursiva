[project]
name = "discursiva-domain"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = []   # domínio puro — sem deps externas

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/discursiva_domain"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
